<!DOCTYPE html>
<html>
<head>
<title>Update Expense</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Update Expense</h2>

<form method="POST">

<label>Item Name</label>
<input type="text" name="item" value="{{expense.item}}" required>
<br><br>

<label>Amount ($)</label>
<input type="number" step="0.01" name="amount" value="{{expense.amount}}" required>
<br><br>

<label>Category (e.g. Food, Travel, Rent)</label>
<input type="text" name="category" value="{{expense.category}}" required>
<br><br>

<button type="submit">Update Expense</button>

</form>

<br>
<a href="/">Back</a>

</body>
</html>
